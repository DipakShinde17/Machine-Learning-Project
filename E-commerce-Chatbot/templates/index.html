<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resume Analyzer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#a7b50e,#097ea5,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
}

.card{
background:rgba(6, 190, 76, 0.08);
backdrop-filter:blur(10px);
border:none;
border-radius:20px;
padding:40px;
text-align:center;
width:450px;
}

.title{
font-size:35px;
font-weight:bold;
margin-bottom:25px;
}

.upload-box{
border:2px dashed white;
padding:25px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#00c853;
border:none;
padding:12px 30px;
font-size:18px;
border-radius:8px;
}

.result{
margin-top:25px;
font-size:28px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<div class="title">📄 Resume Shortlisting System</div>

<form method="POST" enctype="multipart/form-data">

<div class="upload-box">

<input type="file" name="resume" class="form-control" required>

</div>

<button type="submit">Analyze Resume</button>

</form>

{% if result %}

<div class="result">

{{result}}

</div>

{% endif %}

</div>

</body>
</html>
